<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse — Hotel Penguin Paradise</title>
  <meta name="description" content="Regístrate en Hotel Penguin Paradise gratis." />
  <!-- Google Fonts para estilo Club Penguin -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="game-auth-body">
  <div class="page-wrapper">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-main">Hotel</span> <span class="brand-accent">Penguin</span>
        </div>
        <div class="brand-subtitle">REGISTRO DE NUEVO PINGÜINO</div>
      </div>

      <h1 class="card-title">Crear Cuenta</h1>
      <p class="card-description">Completa el formulario para registrarte en el resort</p>

      <!-- Alert container -->
      <div id="alert-box"></div>

      <!-- Form -->
      <form id="register-form" novalidate autocomplete="on">

        <div class="form-group">
          <label class="form-label" for="name">Nombre Completo</label>
          <input
            class="form-input"
            type="text"
            id="name"
            name="name"
            placeholder="Tu nombre"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="ejemplo@correo.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Mínimo 6 caracteres"
              autocomplete="new-password"
              required
            />
            <button type="button" class="toggle-password" id="toggle-pass" aria-label="Mostrar/ocultar contraseña">
              👁
            </button>
          </div>
          <!-- Password strength -->
          <div class="strength-meter" id="strength-meter">
            <div class="strength-bar" id="sb1"></div>
            <div class="strength-bar" id="sb2"></div>
            <div class="strength-bar" id="sb3"></div>
            <div class="strength-bar" id="sb4"></div>
          </div>
          <div class="strength-label" id="strength-label">Ingresa una contraseña</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirmar Contraseña</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Repite tu contraseña"
              autocomplete="new-password"
              required
            />
            <button type="button" class="toggle-password" id="toggle-confirm" aria-label="Mostrar/ocultar contraseña">
              👁
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          Crear Cuenta
        </button>

      </form>

      <div class="form-footer">
        ¿Ya tienes cuenta? <a href="index.html#login">Inicia sesión</a>
      </div>

    </div>
  </div>

  <!-- Modal de Verificación de Cuenta -->
  <div style="position: fixed; inset: 0; background: rgba(0, 31, 87, 0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1.5rem; backdrop-filter: blur(4px);" id="verification-modal">
    <div style="background: linear-gradient(180deg, #0055ff 0%, #002288 100%); border: 5px solid var(--cp-blue-sky); border-radius: 24px; max-width: 440px; width: 100%; padding: 2rem; text-align: center; color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.5);" class="alert-dialog-box">
      <div style="font-size: 3.5rem; margin-bottom: 15px;">✉️</div>
      <h3 style="font-family: var(--font-title); font-size: 1.7rem; margin-bottom: 10px; text-shadow: 2px 2px 0 var(--cp-blue-dark);" class="alert-dialog-title">Verificación de Cuenta</h3>
      <p style="font-size: 0.95rem; color: #cce0ff; margin-bottom: 20px; line-height: 1.4;">
        Ingresa el código de verificación enviado al correo ingresado
      </p>
      
      <div id="modal-alert-box" style="margin-bottom: 15px;"></div>

      <div class="form-group" style="text-align: left; margin-bottom: 20px;">
        <input
          class="form-input"
          type="text"
          id="verification-code"
          placeholder="Código de 6 dígitos"
          style="text-align: center; font-size: 1.5rem; letter-spacing: 5px; font-weight: bold; width: 100%; border: 3px solid var(--cp-blue-sky); border-radius: 12px; padding: 10px;"
          maxlength="6"
        />
      </div>

      <div style="display: flex; gap: 10px;">
        <button class="btn" id="btn-cancel-verify" style="flex: 1; background: #fff; color: #333; border: 2px solid #ccc; font-weight: bold; border-radius: 12px; padding: 10px; cursor: pointer;">Cancelar</button>
        <button class="btn" id="btn-confirm-verify" style="flex: 2; background: linear-gradient(180deg, #00cc33 0%, #009922 100%); border: 3px solid #007711; color: white; box-shadow: 0 4px 0 #005500; font-weight: bold; border-radius: 12px; padding: 10px; cursor: pointer;">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
